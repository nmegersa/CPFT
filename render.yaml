# Render Blueprint — provisions the backend API + Postgres in one connect.
# On render.com: New → Blueprint → connect this repo. Render reads this file,
# creates the database, wires DATABASE_URL, and generates SECRET_KEY.
databases:
  - name: cpft-db
    databaseName: cpft
    user: cpft
    plan: free

services:
  - type: web
    name: cpft-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cpft-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.12"
      # Update this to your real Vercel URL after the frontend deploys.
      - key: FRONTEND_BASE_URL
        value: https://cpft.vercel.app

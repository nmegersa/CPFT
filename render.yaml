# Render Blueprint for the backend API.
# On render.com: New -> Blueprint -> connect this repo. Render reads this file,
# builds the service, and generates SECRET_KEY.
# The database is hosted externally on Neon (free, non-expiring). Set DATABASE_URL
# in the Render dashboard (Environment tab) to your Neon connection string.
services:
  - type: web
    name: cpft-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Set this in the Render dashboard to your Neon connection string.
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.12"
      # Update this to your real Vercel URL after the frontend deploys.
      - key: FRONTEND_BASE_URL
        value: https://cpft.vercel.app

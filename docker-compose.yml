services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cpft
      POSTGRES_PASSWORD: cpft
      POSTGRES_DB: cpft
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cpft"]
      interval: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://cpft:cpft@db:5432/cpft
      SECRET_KEY: change-me-in-production
      FRONTEND_BASE_URL: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
